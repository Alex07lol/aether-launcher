name: Build Linux AppImage

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:  # allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  build-linux:
    name: Build AppImage (Ubuntu x86_64)
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update || true
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            squashfs-tools \
            file

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build AppImage, DEB and Pacman
        run: npx tauri build --bundles appimage,deb,pacman
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Repack AppImage with anylinux.so fix
        run: |
          cd src-tauri/target/release/bundle/appimage/
          
          # Setup tools
          sudo apt-get install -y gcc
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage
          wget -q https://raw.githubusercontent.com/pkgforge-dev/Anylinux-AppImages/main/useful-tools/lib/anylinux.c
          
          for APP in *.AppImage; do
            echo "Patching $APP..."
            
            # Extract
            chmod +x "$APP"
            ./"$APP" --appimage-extract
            
            # Compile anylinux.so directly into the bundle
            gcc -shared -fPIC anylinux.c -ldl -o squashfs-root/usr/lib/anylinux.so
            
            # Wrap AppRun
            mv squashfs-root/AppRun squashfs-root/AppRun.orig
            cat << 'EOF' > squashfs-root/AppRun
          #!/bin/bash
          export LD_PRELOAD="$APPDIR/usr/lib/anylinux.so"
          exec "$APPDIR/AppRun.orig" "$@"
          EOF
            chmod +x squashfs-root/AppRun
            
            # Repack
            ARCH=x86_64 ./appimagetool-x86_64.AppImage --appimage-extract-and-run squashfs-root "patched-$APP"
            
            # Replace original with patched version
            mv "patched-$APP" "$APP"
            rm -rf squashfs-root
          done

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: aether-launcher-linux-appimage
          path: src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: error
          retention-days: 30

      - name: Upload DEB artifact
        uses: actions/upload-artifact@v4
        with:
          name: aether-launcher-linux-deb
          path: src-tauri/target/release/bundle/deb/*.deb
          if-no-files-found: error
          retention-days: 30

      - name: Upload Pacman artifact
        uses: actions/upload-artifact@v4
        with:
          name: aether-launcher-linux-pacman
          path: src-tauri/target/release/bundle/pacman/*
          if-no-files-found: error
          retention-days: 30

      - name: Upload Raw Executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: aether-launcher-linux-executable
          path: src-tauri/target/release/aether-launcher
          if-no-files-found: error
          retention-days: 30

      - name: Upload to GitHub Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/pacman/*
            src-tauri/target/release/aether-launcher
          token: ${{ secrets.GITHUB_TOKEN }}

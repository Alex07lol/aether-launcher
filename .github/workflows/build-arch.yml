name: Build Arch Linux Package

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-arch:
    name: Build Pacman Package (Arch Linux)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Make script executable
        run: chmod +x scripts/build-arch-pkg.sh

      - name: Build Arch Package in Docker Container
        run: |
          docker run --rm -v "$PWD:/workspace" -w /workspace archlinux:base-devel ./scripts/build-arch-pkg.sh

      - name: Upload Pacman artifact
        uses: actions/upload-artifact@v4
        with:
          name: aether-launcher-arch-pacman
          path: artifacts/*.pkg.tar.zst
          if-no-files-found: error
          retention-days: 30

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.pkg.tar.zst
          token: ${{ secrets.GITHUB_TOKEN }}

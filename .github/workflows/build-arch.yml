name: Build Arch Linux Package

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-arch:
    name: Build Pacman Package (Arch Linux)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Build on Arch Linux
        uses: uraimo/run-on-arch-action@v3
        id: build
        with:
          arch: x86_64
          distro: archlinux_latest
          githubToken: ${{ github.token }}
          run: |
            # Update system and install dependencies
            pacman -Syu --noconfirm
            pacman -S --noconfirm base-devel nodejs npm rustup git webkit2gtk
            
            # Setup Rust
            rustup default stable
            
            # Create build user (makepkg cannot run as root)
            useradd builduser -m
            passwd -d builduser
            printf 'builduser ALL=(ALL) ALL\n' | tee -a /etc/sudoers
            
            chown -R builduser:builduser .
            
            # Build using builduser
            sudo -u builduser bash -c '
              npm ci
              npm run build
              
              cat << EOF > PKGBUILD
              pkgname=aether-launcher
              pkgver=0.1.0
              pkgrel=1
              pkgdesc="Aether Launcher"
              arch=("x86_64")
              url="https://github.com/Alex07lol/aether-launcher"
              license=("MIT")
              depends=("webkit2gtk-4.1" "gtk3" "cairo" "pango" "glib2")
              makedepends=("npm" "rust" "cargo")
              source=()
              
              build() {
                cd "\$srcdir/.."
                npx tauri build --bundles none
              }
              
              package() {
                cd "\$srcdir/.."
                install -Dm755 src-tauri/target/release/aether-launcher "\$pkgdir/usr/bin/aether-launcher"
                install -Dm644 src-tauri/icons/128x128.png "\$pkgdir/usr/share/pixmaps/aether-launcher.png"
                
                mkdir -p "\$pkgdir/usr/share/applications"
                cat << DESK > "\$pkgdir/usr/share/applications/aether-launcher.desktop"
              [Desktop Entry]
              Name=Aether Launcher
              Exec=aether-launcher
              Icon=aether-launcher
              Terminal=false
              Type=Application
              Categories=Utility;
              DESK
              }
              EOF
              makepkg -s --noconfirm
              
              # Copy output to artifacts
              mkdir -p artifacts
              cp *.pkg.tar.zst artifacts/
            '

      - name: Upload Pacman artifact
        uses: actions/upload-artifact@v4
        with:
          name: aether-launcher-arch-pacman
          path: artifacts/*.pkg.tar.zst
          if-no-files-found: error
          retention-days: 30

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.pkg.tar.zst
          token: ${{ secrets.GITHUB_TOKEN }}
